target: src/lib/wallpaper.ts
language: typescript
framework: vitest
test_file: src/lib/wallpaper.test.ts
suites:
  - "WALLPAPER_PATHS"
  - "classifyWallpaper"
  - "resolveImageWallpaperUrl"
  - "BackgroundLoadError"
cases:
  - title: "contains WALLPAPER_COUNT entries"
  - title: "DEFAULT_WALLPAPER is WALLPAPER_PATHS[0]"
  - title: "hex color"
  - title: "rgb() color"
  - title: "rgba() color"
  - title: "hsl() color"
  - title: "oklch() color"
  - title: "linear gradient"
  - title: "radial gradient"
  - title: "conic gradient"
  - title: "repeating-linear gradient"
  - title: "repeating-radial gradient"
  - title: "leading-slash image path"
  - title: "http URL as image"
  - title: "file:// URL as image"
  - title: "data URI as image"
  - title: "named color falls back to color"
  - title: "empty string falls back to black"
  - title: "trims whitespace"
  - title: "DEFAULT_WALLPAPER classifies as image"
  - title: "passes through http URL"
  - title: "passes through https URL"
  - title: "passes through file:// URL"
  - title: "passes through data URI"
  - title: "resolves leading-slash wallpaper path via http fallback"
  - title: "resolves bare relative wallpaper path"
  - title: "encodes special characters in path segments"
  - title: "rejects image paths outside /wallpapers/ with UnsafeImagePrefixError as cause"
  - title: "wraps traversal attempts in BackgroundLoadError (preserves UnsafeAssetPathError as cause)"
  - title: "wraps percent-encoded traversal in BackgroundLoadError"
  - title: "resolves via electronAPI.assetBaseUrl when not http"
  - title: "appends trailing slash to assetBaseUrl if missing"
  - title: "wraps AssetBaseUnavailableError in BackgroundLoadError when assetBaseUrl is empty"
  - title: "carries the failing URL and is instanceof Error"
  - title: "displayUrl hides parent directories to avoid leaking PII"
  - title: "displayUrl abbreviates data URIs"
  - title: "displayUrl returns sentinel for empty-basename URLs"
  - title: "displayUrl returns sentinel for unparseable bare slash"
  - title: "preserves cause when provided"
