<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B1826"/>
      <stop offset="1" stop-color="#0B0A12"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9B84FF"/>
      <stop offset="0.55" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5B3DF5"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#A78BFF"/>
      <stop offset="0.6" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5B3DF5"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- macOS-style squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#glow)"/>
  <rect x="66" y="66" width="892" height="892" rx="202" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>

  <!-- REC ring: open arc suggests both a lens and a progress ring -->
  <circle cx="512" cy="516" r="238" fill="none" stroke="url(#ring)" stroke-width="58"
          stroke-linecap="round" stroke-dasharray="1196 300"
          transform="rotate(118 512 516)"/>

  <!-- Recording dot -->
  <circle cx="512" cy="516" r="128" fill="url(#dot)"/>
  <circle cx="472" cy="474" r="42" fill="#ffffff" fill-opacity="0.28"/>

  <!-- AI sparkle, sitting in the ring's opening -->
  <g fill="#EDE8FF">
    <path d="M748 208 L771 268 L831 291 L771 314 L748 374 L725 314 L665 291 L725 268 Z"/>
    <path d="M836 386 L849 419 L882 432 L849 445 L836 478 L823 445 L790 432 L823 419 Z" fill-opacity="0.85"/>
  </g>
</svg>
